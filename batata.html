<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batata - Comments</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fce4ec; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.1);
            position: sticky;
            top: 0;
        }

        nav a {
            font-family: 'Playfair Display', serif;
            text-decoration: none;
            color: #8B0000;
            font-size: 1.4rem;
            margin: 0 30px;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        nav a:hover { opacity: 0.6; }

        .comment-section {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.1);
            text-align: center;
            flex-grow: 1;
        }

        .comment-section h1 {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 30px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ffb6c1;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            background-color: #fff;
        }

        button {
            background-color: #8B0000;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background-color: #600000; }

        #display-area {
            margin-top: 40px;
            text-align: left;
        }

        .posted-comment {
            background-color: white;
            padding: 20px;
            border-left: 4px solid #8B0000;
            border-radius: 5px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .posted-comment strong {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 5px;
        }

        footer {
            text-align: right;
            padding: 20px 40px;
            margin-top: auto;
            border-top: 1px solid rgba(139, 0, 0, 0.1);
        }

        footer p {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 1.1rem;
            margin: 0;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Nosotros</a>
        <a href="batata.html">Batata</a>
    </nav>

    <div class="comment-section">
        <h1>Leave a Note</h1>
        <input type="text" id="visitorName" placeholder="Your glamorous name...">
        <textarea id="visitorComment" rows="4" placeholder="Share your thoughts..."></textarea>
        <button onclick="postComment()">Drop Comment</button>

        <div id="display-area"></div>
    </div>

    <footer>
        <p><strong>Facundo Godoy</strong><br><em>"Your custom words go right here."</em></p>
    </footer>

    <script>
        // 1. Create an array to hold the comments
        let myComments = [];

        // 2. When the page loads, pull the saved list from the browser
        window.onload = function() {
            const savedData = localStorage.getItem("batataCommentsData");
            if (savedData) {
                myComments = JSON.parse(savedData); // Convert back to a list
                renderAllComments(); // Draw them on the screen
            }
        };

        // 3. Function to draw all comments to the screen
        function renderAllComments() {
            const displayArea = document.getElementById("display-area");
            displayArea.innerHTML = ""; // Clear the area first

            // Loop through the list and build a box for each one
            for (let i = 0; i < myComments.length; i++) {
                let newBox = document.createElement("div");
                newBox.className = "posted-comment";
                newBox.innerHTML = "<strong>" + myComments[i].name + "</strong>" + myComments[i].text;
                displayArea.appendChild(newBox);
            }
        }

        // 4. Function that runs when you click the button
        function postComment() {
            const nameInput = document.getElementById("visitorName").value;
            const commentInput = document.getElementById("visitorComment").value;
            
            if (nameInput === "" || commentInput === "") {
                alert("Please fill in both your name and comment!");
                return;
            }

            // Add the new comment to the START of our list
            myComments.unshift({ name: nameInput, text: commentInput });
            
            // Save the newly updated list to the browser
            localStorage.setItem("batataCommentsData", JSON.stringify(myComments));
            
            // Redraw the screen to show the new comment
            renderAllComments();
            
            // Clear the input boxes
            document.getElementById("visitorName").value = "";
            document.getElementById("visitorComment").value = "";
        }
    </script>

</body>
</html>
