<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batata - Comments</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fce4ec; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        /* --- Same Navigation Bar --- */
        nav {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.1);
            position: sticky;
            top: 0;
        }

        nav a {
            font-family: 'Playfair Display', serif;
            text-decoration: none;
            color: #8B0000;
            font-size: 1.4rem;
            margin: 0 30px;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        nav a:hover { opacity: 0.6; }

        /* --- Glamorous Comment Section --- */
        .comment-section {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.1);
            text-align: center;
        }

        .comment-section h1 {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 30px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ffb6c1;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            background-color: #fff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #8B0000;
        }

        button {
            background-color: #8B0000;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #600000;
        }

        /* Where the comments appear */
        #display-area {
            margin-top: 40px;
            text-align: left;
        }

        .posted-comment {
            background-color: white;
            padding: 20px;
            border-left: 4px solid #8B0000;
            border-radius: 5px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .posted-comment strong {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="batata.html">Batata</a>
    </nav>

    <div class="comment-section">
        <h1>Leave a Note</h1>
        
        <input type="text" id="visitorName" placeholder="Your glamorous name...">
        <textarea id="visitorComment" rows="4" placeholder="Share your thoughts..."></textarea>
        <button onclick="postComment()">Drop Comment</button>

        <div id="display-area">
            </div>
    </div>

    <script>
        function postComment() {
            var name = document.getElementById("visitorName").value;
            var comment = document.getElementById("visitorComment").value;
            
            if (name === "" || comment === "") {
                alert("Please fill in both your name and comment!");
                return;
            }

            var displayArea = document.getElementById("display-area");
            
            // Create the glamorous comment box
            var newBox = document.createElement("div");
            newBox.className = "posted-comment";
            newBox.innerHTML = "<strong>" + name + "</strong>" + comment;
            
            // Add it to the page
            displayArea.prepend(newBox);
            
            // Clear the form for the next person
            document.getElementById("visitorName").value = "";
            document.getElementById("visitorComment").value = "";
        }
    </script>

</body>
</html>
