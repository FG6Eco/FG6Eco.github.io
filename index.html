<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fce4ec; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* --- Glamorous Navigation Bar --- */
        nav {
            background-color: rgba(255, 255, 255, 0.85); /* Glass effect */
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            font-family: 'Playfair Display', serif;
            text-decoration: none;
            color: #8B0000;
            font-size: 1.4rem;
            margin: 0 30px;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.6; /* Soft fade when hovered */
        }

        header {
            padding: 50px 20px 20px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            color: #8B0000; 
            text-decoration: underline; 
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #8B0000; 
            margin-top: 15px;
        }

        .scroll-container {
            width: 100vw;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.4);
            padding: 30px 0;
            margin-top: 30px;
            white-space: nowrap;
        }

        .scroll-track {
            display: inline-block;
            animation: scroll-left 20s linear infinite; 
        }

        .scroll-track img {
            height: 300px;
            width: auto;
            margin-right: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .phrases-section {
            padding: 50px 20px;
            text-align: center;
        }

        .phrases-section h2 {
            font-family: 'Playfair Display', serif;
            color: #8B0000;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .phrase-card {
            background-color: rgba(255, 255, 255, 0.6);
            border-left: 6px solid #8B0000;
            padding: 20px 30px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 1.3rem;
            font-style: italic;
            color: #444;
            text-align: left;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="batata.html">Batata</a>
    </nav>

    <header>
        <h1>My Personal Space</h1>
        <p class="subtitle">Welcome to my corner of the internet. Here are some of my favorite moments!</p>
    </header>

    <div class="scroll-container">
        <div class="scroll-track">
            <img src="https://via.placeholder.com/400x300/ffb6c1/ffffff?text=Your+Photo+1" alt="Photo 1">
            <img src="https://via.placeholder.com/350x300/ffb6c1/ffffff?text=Your+Photo+2" alt="Photo 2">
            <img src="https://via.placeholder.com/450x300/ffb6c1/ffffff?text=Your+Photo+3" alt="Photo 3">
            <img src="https://via.placeholder.com/300x300/ffb6c1/ffffff?text=Your+Photo+4" alt="Photo 4">
            <img src="https://via.placeholder.com/400x300/ffb6c1/ffffff?text=Your+Photo+5" alt="Photo 5">
        </div>
    </div>

    <section class="phrases-section">
        <h2>Some Thoughts & Phrases</h2>
        <div class="phrase-card">"Here is where you can type your first phrase..."</div>
    </section>

</body>
</html>
