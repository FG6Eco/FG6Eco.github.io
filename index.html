<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Pastel pink background */
            background-color: #fce4ec; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow-x: hidden; /* Prevents the whole page from scrolling sideways */
        }

        header {
            /* Pushes the title to the upper-left corner */
            padding: 30px 40px;
            text-align: left;
        }

        h1 {
            /* Beautiful typography and considerable size */
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            color: #4a1c2f; /* A darker burgundy-pink for contrast */
        }

        main {
            padding: 0 40px;
        }

        /* --- The Scrolling Photo Gallery --- */
        .scroll-container {
            width: 100vw;
            margin-left: -40px; /* Stretches the scroll across the whole screen */
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.4); /* Soft white strip behind photos */
            padding: 30px 0;
            margin-top: 40px;
            white-space: nowrap;
        }

        .scroll-track {
            display: inline-block;
            /* Adjust the '20s' to make the scroll faster or slower */
            animation: scroll-left 20s linear infinite; 
        }

        .scroll-track img {
            height: 300px; /* Size of your photos */
            width: auto;
            margin-right: 25px;
            border-radius: 15px; /* Soft rounded corners */
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); /* Subtle shadow so they pop */
        }

        /* The animation moving from right to left */
        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Personal Space</h1>
    </header>

    <main>
        <p style="font-size: 1.2rem; color: #5a3c48;">
            Welcome to my corner of the internet. Here are some of my favorite moments!
        </p>
    </main>

    <div class="scroll-container">
        <div class="scroll-track">
            <img src="https://via.placeholder.com/400x300/ffb6c1/ffffff?text=Your+Photo+1" alt="Photo 1">
            <img src="https://via.placeholder.com/350x300/ffb6c1/ffffff?text=Your+Photo+2" alt="Photo 2">
            <img src="https://via.placeholder.com/450x300/ffb6c1/ffffff?text=Your+Photo+3" alt="Photo 3">
            <img src="https://via.placeholder.com/300x300/ffb6c1/ffffff?text=Your+Photo+4" alt="Photo 4">
            <img src="https://via.placeholder.com/400x300/ffb6c1/ffffff?text=Your+Photo+5" alt="Photo 5">
        </div>
    </div>

</body>
</html>
